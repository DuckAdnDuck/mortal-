<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="http://code.jquery.com/jquery-latest.js" ></script>
    <title>登入</title>
		
</head>
<body>

<audio  autoplay="autoplay" loop="loop" src="bgm/S12决赛BGM.mp3" >
	
</audio>

<link href="css/login.css" rel="stylesheet" >
<div class="box" >
    <div class="pre-box" >
        <h1>WELCOME</h1>
        <p>JOIN US!</p>
        <div class="img-box" >
            <img src="images/阿尼亚_笑.webp" alt="" >
        </div>
    </div>
    <div class="register-form"  >
<!--
这个也是自己写的
-->
        <form>
        <div class="title-box" >
        <h1>注册</h1>
        </div>
        <div class="input-box" >
            <input id="regUsername" type="text" placeholder="用户名">
            <input id="regPassword" type="password" placeholder="密码">
            <input id="regPassword2" type="password" placeholder="确认密码">
        </div>
        <div class="btn-box" >
            <input class="input_1" type="button" value="注册" onclick="register()">
            <p onclick="mySwitch()" >已有账号？去登入</p>
        </div>
        </form>
    </div>
    <div class="login-form" >
<!--
这个form标签是自己添加的，测试专用
-->
        <form action="#" method="post">
        <div class="title-box" >
        <h1>登入</h1>
        </div>
    <div class="input-box" >
        <input id="loginUsername" type="text" placeholder="用户名">
        <input id="loginPassword" type="password" placeholder="密码">
    </div>
    <div class="btn-box" >
        <input class="input_1" type="button" value="登入" onclick="login()">
        <p onclick="mySwitch()" >没有账号？去注册</p>
    </div>
        </form>
    </div>
</div>
</body>
<script>
	
    let flag=true;
    const mySwitch=()=>{
        if(flag){
            $(".pre-box").css("transform","translateX(100%)")
            $(".pre-box").css("background-color","#95CBF3")
            $("img").attr("src","images/阿尼亚_哭.webp")
        }else {
            $(".pre-box").css("transform","translateX(0%)")
            $(".pre-box").css("background-color","#f0b8c8")
            $("img").attr("src","images/阿尼亚_笑.webp")
        }
        flag=!flag;
    }
	
	
	// 登入函数
	function login() {
	    let username = $("#loginUsername").val();
	    let password = $("#loginPassword").val();
	
	    $.ajax({
	        url: "http://localhost:8080/user/login",
	        type: "POST",
	        contentType: "application/json",
	        data: JSON.stringify({
	            username: username,
	            password: password
	        }),
	        success: function(res) {
	            if (res && res.username) {
	                //  保存用户信息
	                localStorage.setItem("user", JSON.stringify(res));
	        
	                alert("登录成功");
	                $("body").fadeOut(500, function () {
	                    window.location.href = "./index.html";
	                });
	            } else {
	                alert("账号或密码错误");
	            }
	        },
	        error: function(err) {
	            console.log(err);
	            alert("请求失败");
	        }
	    });
	}
	// 注册函数
	function register() {
	    let username = $("#regUsername").val();
	    let password = $("#regPassword").val();
	    let password2 = $("#regPassword2").val();
	
	    if (password !== password2) {
	        alert("两次密码不一致");
	        return;
	    }
	
	    $.ajax({
	        url: "http://localhost:8080/user/register",
	        type: "POST",
	        contentType: "application/json",
	        data: JSON.stringify({
	            username: username,
	            password: password
	        }),
	        success: function(res) {
	            alert("注册成功");
	        },
	        error: function(err) {
	            console.log(err);
	            alert("注册失败");
	        }
	    });
	}
</script>

</html>
